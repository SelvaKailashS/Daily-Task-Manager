{% extends 'base.html' %}
{% block title %}INTEL{% endblock %}
{% block extra_css %}
<style>
.intel-container { padding: 54px 20px 20px; }
.intel-title { font-family: 'Russo One'; font-size: 24px; color: var(--tan); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; border-bottom: 2px solid var(--olive); padding-bottom: 16px; }
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-box { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--olive); padding: 14px; border-radius: 4px; }
.stat-num { font-family: 'Russo One'; font-size: 28px; color: var(--olive2); }
.stat-lbl { font-family: 'Share Tech Mono'; font-size: 9px; color: var(--text3); text-transform: uppercase; margin-top: 6px; }
</style>
{% endblock %}
{% block content %}

<div class="intel-container">
  <div class="intel-title">TACTICAL INTEL</div>
  
  <div class="stat-grid">
    <div class="stat-box">
      <div class="stat-num">{{ total_completions }}</div>
      <div class="stat-lbl">Total Completions</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">{{ avg_rate }}%</div>
      <div class="stat-lbl">Success Rate</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">{{ data|length }}</div>
      <div class="stat-lbl">Active Habits</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">{{ longest_streak }}</div>
      <div class="stat-lbl">Longest Streak</div>
    </div>
  </div>

</div>

{% endblock %}
